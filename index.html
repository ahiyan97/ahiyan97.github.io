<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English to Korean Translator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#2563eb,#7c3aed,#0ea5e9,#1e293b);
background-size:400% 400%;
animation:gradient 15s ease infinite;
color:white;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:90%;
max-width:700px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
text-align:center;
animation:fadeIn 1.5s;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
margin-bottom:20px;
font-size:40px;
}

p{
margin-bottom:20px;
color:#e2e8f0;
}

textarea{
width:100%;
height:150px;
padding:15px;
border:none;
border-radius:15px;
font-size:18px;
resize:none;
outline:none;
}

button{
margin-top:20px;
padding:15px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:#3b82f6;
color:white;
cursor:pointer;
transition:.4s;
}

button:hover{
transform:scale(1.08);
}

.result{
margin-top:25px;
padding:20px;
border-radius:15px;
background:rgba(255,255,255,0.1);
min-height:80px;
font-size:22px;
}

footer{
position:fixed;
bottom:15px;
font-size:14px;
color:#e2e8f0;
}

</style>
</head>

<body>

<div class="container">

<h1>🇬🇧 ➜ 🇰🇷 Translator</h1>

<p>English to Korean Translation Tool</p>

<textarea id="englishText" placeholder="Type English here..."></textarea>

<button onclick="translateText()">Translate</button>

<div class="result" id="result">
Korean translation will appear here.
</div>

</div>

<footer>
Created by ISLAM SANJIDA | Konkuk University
</footer>

<script>

function translateText(){

let text=document.getElementById("englishText").value.toLowerCase();

let dictionary={

"hello":"안녕하세요",
"thank you":"감사합니다",
"good morning":"좋은 아침입니다",
"good night":"안녕히 주무세요",
"how are you":"어떻게 지내세요?",
"i love you":"사랑해요",
"yes":"네",
"no":"아니요",
"welcome":"환영합니다",
"student":"학생",
"teacher":"선생님",
"computer":"컴퓨터",
"software":"소프트웨어",
"university":"대학교",
"friend":"친구",
"food":"음식",
"water":"물",
"book":"책",
"language":"언어",
"study":"공부"
};

if(dictionary[text]){
document.getElementById("result").innerHTML=dictionary[text];
}
else{
document.getElementById("result").innerHTML=
"Translation not found in dictionary.";
}

}

</script>

</body>
</html>
